<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wheesht — Cartoon Mascot</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#F4EEE3; --ink:#1A1A1A; --yellow:#F5C800; --red:#E8272A; --ink2:#5A554C;
    --disp:'Bricolage Grotesque',sans-serif; --body:'Hanken Grotesk',sans-serif; }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{ font-family:var(--body); color:var(--ink); min-height:100vh;
    background:var(--bg); padding:34px 22px 70px; }
  .wrap{max-width:1100px;margin:0 auto;}
  h1{font-family:var(--disp);font-weight:800;letter-spacing:-.02em;font-size:34px;margin:0 0 4px;}
  .sub{color:var(--ink2);font-weight:600;font-size:15px;margin-bottom:26px;max-width:640px;}
  .hero{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;
    background:var(--yellow);border-radius:28px;padding:30px 26px;border:3px solid var(--ink);
    box-shadow:0 16px 0 -2px var(--ink);margin-bottom:18px;}
  .center{text-align:center;}
  .pill{display:inline-block;background:var(--ink);color:var(--yellow);font-weight:800;font-size:11px;
    letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;border-radius:999px;margin:0 auto 16px;}
  .copy{max-width:560px;text-align:center;color:var(--ink);font-weight:600;font-size:14px;line-height:1.5;margin:14px auto 0;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;margin-top:26px;}
  .cell{background:#fff;border:3px solid var(--ink);border-radius:20px;padding:14px 12px 16px;
    display:flex;flex-direction:column;align-items:center;box-shadow:0 8px 0 -1px var(--ink);}
  .cell .name{font-family:var(--disp);font-weight:800;font-size:16px;color:var(--ink);text-transform:capitalize;margin-top:4px;}
  .cell .meta{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.03em;}
  .cell.scot{background:#0a4aa0;border-color:#06316c;box-shadow:0 8px 0 -1px #06316c;}
  .cell.scot .name{color:#fff;} .cell.scot .meta{color:#bcd2f0;}
  .secthead{font-family:var(--disp);font-weight:800;font-size:13px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink2);margin:34px 0 12px;}
  .sizes{display:flex;align-items:flex-end;gap:18px;background:#fff;border:3px solid var(--ink);
    border-radius:20px;padding:22px 24px;flex-wrap:wrap;box-shadow:0 8px 0 -1px var(--ink);}
  .sizes .s{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--ink2);font-weight:700;font-size:11px;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Wheesht — Cartoon Mascot (variation D)</h1>
    <div class="sub">Side-profile referee-whistle silhouette: round chamber, mouthpiece projecting left, the sound-window on top and the finger ring above. Bold uniform black outlines, flat grey fills, rubber-hose arms, white gloves, big shoes — built to read at any size.</div>
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script type="text/babel" src="static/app/wheesht-mascot.jsx"></script>
  <script type="text/babel">
    const WM = window.WheeshtMascot;
    const MOODS = [
      ['neutral','idle + breathe'],['happy','thumbs up'],['celebrating','arms up · sparks'],
      ['shocked','recoil'],['nervous','sweat · jitter'],['confident','smug · toot'],
      ['angry','red card · steam'],['crying','tears'],['mischievous','the glint'],
      ['scottish','TAM ON · wave'],
    ];
    function Lab(){
      return (
        <React.Fragment>
          <div className="hero">
            <div className="center">
              <span className="pill">Variation D · cartoon mascot-logo</span>
              <WM mood="happy" size={300} animate />
              <div className="copy">A proper ref whistle seen side-on — friendly, bold and legible at any size. He breathes, blinks, throws a thumbs-up and toots the whistle. The Scottish mood adds a cocked tam and saltire cheeks without breaking the outline.</div>
            </div>
          </div>

          <div className="secthead">The full range — all animated</div>
          <div className="grid">
            {MOODS.map(([m,meta])=>(
              <div key={m} className={'cell'+(m==='scottish'?' scot':'')}>
                <WM mood={m} size={190} animate />
                <div className="name">{m}</div>
                <div className="meta">{meta}</div>
              </div>
            ))}
          </div>

          <div className="secthead">Reads at every size</div>
          <div className="sizes">
            {[40,56,80,120,180].map(s=>(
              <div className="s" key={s}><WM mood="happy" size={s} animate /><span>{s}px</span></div>
            ))}
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Lab/>);
  </script>
</body>
</html>
