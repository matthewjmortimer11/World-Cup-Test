<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wheesht — Profile Variation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#F4EEE3; --ink:#1A1A1A; --yellow:#F5C800; --red:#E8272A; --ink2:#5A554C;
    --disp:'Bricolage Grotesque',sans-serif; --body:'Hanken Grotesk',sans-serif; }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{ font-family:var(--body); color:#fff; min-height:100vh;
    background:radial-gradient(120% 90% at 50% 0%, #2b2925 0%, #16151300 80%), #131210; padding:34px 22px 60px; }
  .wrap{max-width:1120px;margin:0 auto;}
  h1{font-family:var(--disp);font-weight:800;letter-spacing:-.02em;font-size:34px;margin:0 0 4px;}
  .sub{color:#b9b1a3;font-weight:600;font-size:15px;margin-bottom:26px;}
  .hero{display:flex;gap:24px;align-items:center;background:var(--bg);border-radius:26px;padding:24px 28px;
    box-shadow:0 24px 60px -20px rgba(0,0,0,.6);margin-bottom:30px;flex-wrap:wrap;}
  .hero .copy{flex:1;min-width:240px;color:var(--ink);}
  .hero h2{font-family:var(--disp);font-weight:800;font-size:26px;margin:0 0 6px;letter-spacing:-.02em;}
  .hero p{font-weight:600;color:var(--ink2);font-size:14px;line-height:1.45;margin:0;}
  .pill{display:inline-block;background:var(--ink);color:var(--yellow);font-weight:800;font-size:11px;
    letter-spacing:.08em;text-transform:uppercase;padding:5px 11px;border-radius:999px;margin-bottom:10px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
  .cell{background:var(--bg);border-radius:20px;padding:14px 12px 16px;display:flex;flex-direction:column;
    align-items:center;box-shadow:0 14px 34px -18px rgba(0,0,0,.55);}
  .cell .name{font-family:var(--disp);font-weight:800;font-size:16px;color:var(--ink);text-transform:capitalize;margin-top:4px;}
  .cell .meta{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.03em;}
  .cell.scot{background:linear-gradient(160deg,#0a4aa0,#06316c);}
  .cell.scot .name{color:#fff;} .cell.scot .meta{color:#bcd2f0;}
  .secthead{font-family:var(--disp);font-weight:800;font-size:13px;letter-spacing:.1em;text-transform:uppercase;
    color:#b9b1a3;margin:34px 0 12px;}
  .compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .cc{background:var(--bg);border-radius:20px;padding:18px;display:flex;flex-direction:column;align-items:center;}
  .cc .lab{font-family:var(--disp);font-weight:800;font-size:14px;color:var(--ink);margin-bottom:6px;}
  .cc .tag{font-size:11px;font-weight:700;color:var(--ink2);}
  .sizes{display:flex;align-items:flex-end;gap:18px;background:var(--bg);border-radius:20px;padding:20px 24px;flex-wrap:wrap;}
  .sizes .s{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--ink2);font-weight:700;font-size:11px;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Wheesht — Profile Variation (B)</h1>
    <div class="sub">A side-on referee whistle: chamber as the head, mouthpiece as a snout, finger-grip ring on top. Tam o' shanter on the Scottish mood only.</div>
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script type="text/babel" src="static/app/wheesht.jsx"></script>
  <script type="text/babel" src="static/app/wheesht-profile.jsx"></script>
  <script type="text/babel">
    const MOODS = [
      ['neutral','at rest'],['happy','raised brow'],['celebrating','arm up · toot'],
      ['shocked','recoil'],['nervous','sweat · jitter'],['confident','smug · toot'],
      ['angry','red card · steam'],['crying','tears'],['mischievous','the glint'],
      ['scottish','TAM ON'],
    ];
    const WP = window.WheeshtProfile, WF = window.Wheesht;
    function Lab(){
      return (
        <React.Fragment>
          <div className="hero">
            <WP mood="confident" size={210} animate />
            <div className="copy">
              <span className="pill">Variation B · side-on</span>
              <h2>The whistle, in profile.</h2>
              <p>Reads instantly as a referee's whistle — the round acoustic chamber becomes the head, the mouthpiece a snout that puffs air when he's pleased, and the finger-grip loop sits on top. Same chrome, same ten moods. The bunnet only comes out for Scotland.</p>
            </div>
          </div>

          <div className="secthead">The full cast — side-on, all animated</div>
          <div className="grid">
            {MOODS.map(([m,meta])=>(
              <div key={m} className={'cell'+(m==='scottish'?' scot':'')}>
                <WP mood={m} size={190} animate />
                <div className="name">{m}</div>
                <div className="meta">{meta}</div>
              </div>
            ))}
          </div>

          <div className="secthead">A vs B — same mood, two silhouettes</div>
          <div className="compare">
            {['happy','scottish'].map(m=>(
              <div className="cc" key={m}>
                <div style={{display:'flex',gap:14,alignItems:'flex-end'}}>
                  <div style={{textAlign:'center'}}><WF mood={m} size={150} animate /><div className="tag">A · front-on</div></div>
                  <div style={{textAlign:'center'}}><WP mood={m} size={172} animate /><div className="tag">B · profile</div></div>
                </div>
                <div className="lab" style={{marginTop:8,textTransform:'capitalize'}}>{m}</div>
              </div>
            ))}
          </div>

          <div className="secthead">Reads at every size</div>
          <div className="sizes">
            {[40,56,80,120,180].map(s=>(
              <div className="s" key={s}><WP mood="happy" size={s} animate /><span>{s}px</span></div>
            ))}
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Lab/>);
  </script>
</body>
</html>
