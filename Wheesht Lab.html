<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wheesht — Mascot Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#F4EEE3; --ink:#1A1A1A; --yellow:#F5C800; --red:#E8272A; --ink2:#5A554C;
    --disp:'Bricolage Grotesque',sans-serif; --body:'Hanken Grotesk',sans-serif; }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{ font-family:var(--body); color:#fff; min-height:100vh;
    background:radial-gradient(120% 90% at 50% 0%, #2b2925 0%, #16151300 80%), #131210; padding:34px 22px 60px; }
  .wrap{max-width:1080px;margin:0 auto;}
  h1{font-family:var(--disp);font-weight:800;letter-spacing:-.02em;font-size:34px;margin:0 0 4px;}
  .sub{color:#b9b1a3;font-weight:600;font-size:15px;margin-bottom:26px;}
  .hero{display:flex;gap:24px;align-items:center;background:var(--bg);border-radius:26px;padding:24px 28px;
    box-shadow:0 24px 60px -20px rgba(0,0,0,.6);margin-bottom:30px;flex-wrap:wrap;}
  .hero .copy{flex:1;min-width:240px;color:var(--ink);}
  .hero h2{font-family:var(--disp);font-weight:800;font-size:26px;margin:0 0 6px;letter-spacing:-.02em;}
  .hero p{font-weight:600;color:var(--ink2);font-size:14px;line-height:1.45;margin:0;}
  .pill{display:inline-block;background:var(--ink);color:var(--yellow);font-weight:800;font-size:11px;
    letter-spacing:.08em;text-transform:uppercase;padding:5px 11px;border-radius:999px;margin-bottom:10px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}
  .cell{background:var(--bg);border-radius:20px;padding:14px 14px 16px;display:flex;flex-direction:column;
    align-items:center;box-shadow:0 14px 34px -18px rgba(0,0,0,.55);}
  .cell .name{font-family:var(--disp);font-weight:800;font-size:16px;color:var(--ink);text-transform:capitalize;margin-top:6px;}
  .cell .meta{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.03em;}
  .cell.scot{background:linear-gradient(160deg,#0a4aa0,#06316c);}
  .cell.scot .name{color:#fff;} .cell.scot .meta{color:#bcd2f0;}
  .secthead{font-family:var(--disp);font-weight:800;font-size:13px;letter-spacing:.1em;text-transform:uppercase;
    color:#b9b1a3;margin:34px 0 12px;}
  .sizes{display:flex;align-items:flex-end;gap:20px;background:var(--bg);border-radius:20px;padding:20px 24px;flex-wrap:wrap;}
  .sizes .s{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--ink2);font-weight:700;font-size:11px;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Wheesht — Mascot Lab</h1>
    <div class="sub">New chrome finish · tam o' shanter · tartan · 10 moods · breathing, blinking &amp; live eye-tracking.</div>
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script type="text/babel" src="static/app/wheesht.jsx"></script>
  <script type="text/babel">
    const MOODS = [
      ['neutral','at rest · idle + breathe'],
      ['happy','warm · raised brows'],
      ['celebrating','arms up · sparkles'],
      ['shocked','wide · recoil'],
      ['nervous','sweat · jitter'],
      ['confident','smug · hands on hips'],
      ['angry','ref rage · red card'],
      ['crying','tears · droop'],
      ['mischievous','sly · the glint'],
      ['scottish','SCOTTISH MODE'],
    ];
    function Lab(){
      return (
        <React.Fragment>
          <div className="hero">
            <window.Wheesht mood="confident" size={190} animate track />
            <div className="copy">
              <span className="pill">Move your cursor — his eyes follow</span>
              <h2>Meet the new Wheesht.</h2>
              <p>Polished chrome body, a proper tam o' shanter with a tartan band and red toorie, and a cast of expressions built to carry the whole app. He breathes, he blinks, and he watches the room. Constitutionally impartial. Otherwise, obviously, not.</p>
            </div>
          </div>

          <div className="secthead">The full cast — all animated</div>
          <div className="grid">
            {MOODS.map(([m,meta])=>(
              <div key={m} className={'cell'+(m==='scottish'?' scot':'')}>
                <window.Wheesht mood={m} size={150} animate track={m==='neutral'} />
                <div className="name">{m}</div>
                <div className="meta">{meta}</div>
              </div>
            ))}
          </div>

          <div className="secthead">Reads at every size</div>
          <div className="sizes">
            {[40,56,80,120,170].map(s=>(
              <div className="s" key={s}>
                <window.Wheesht mood="happy" size={s} animate />
                <span>{s}px</span>
              </div>
            ))}
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Lab/>);
  </script>
</body>
</html>
